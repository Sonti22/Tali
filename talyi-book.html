    cursor.style.cssText = 'position:fixed;width:80px;height:80px;border:2px solid var(--accent);border-radius:50%;pointer-events:none;z-index:9999;opacity:0;transform:translate(-50%,-50%);transition:opacity 0.2s,width 0.2s,height 0.2s;backdrop-filter:contrast(1.4) saturate(1.3);background:rgba(196,106,58,0.06);mix-blend-mode:multiply;';
    document.body.appendChild(cursor);
    let activeImg = null;
    const onMove = (e) => {
      cursor.style.left = e.clientX + 'px';
      cursor.style.top = e.clientY + 'px';
    };
    const onOver = (e) => {
      const img = e.target.closest('img');
      if (img && (img.closest('section[data-screen-label="История"]') || img.closest('section[data-screen-label="Мемориал"]') || img.closest('section[data-screen-label="Утраченное"]') || img.closest('section#church') || img.closest('section#walk1910'))) {
        activeImg = img;
        cursor.style.opacity = '1';
      } else {
        activeImg = null;
        cursor.style.opacity = '0';
      }
    };
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseover', onOver);
    return () => {
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseover', onOver);
      cursor.remove();
    };
  }, []);
  return null;
}

// === Implementation 6: Decade ticker (corner counter) ===
function DecadeTicker() {
  const isMobile = typeof window.useMobile === 'function' ? window.useMobile() : false;
  const [decade, setDecade] = React.useState(null);
  const [visible, setVisible] = React.useState(false);
  React.useEffect(() => {
    if (isMobile) return;
    // map sections to representative years
    const sectionYears = {
      'history': 1747, 'today': 2026, 'nature': 2026, 'people': 1900,
      'cuisine': 1900, 'gallery': 1910, 'memorial': 1942, 'draft1941': 1941,
      'church': 1783, 'school': 1894, 'demography': 1916, 'thennow': 1910,
      'family': 1789, 'walk1910': 1910, 'lost': 1900, 'records': 1916,
      'letters': 1813, 'neighbors': 1900, 'grain': 1916, 'crafts': 1900,
      'toponymy': 1755, 'dialect': 1900, 'map': 2026, 'contacts': 2026,
      'calendar': 1900, 'quiz': 2026, 'weather': 2026,
    };
    let lastY = null;
    const onScroll = () => {
      let active = null;
      Object.keys(sectionYears).forEach(id => {
        const sec = document.getElementById(id);
        if (sec) {
          const r = sec.getBoundingClientRect();
          if (r.top < window.innerHeight * 0.5 && r.bottom > window.innerHeight * 0.3) {
            active = sectionYears[id];
          }
        }
      });
      if (active !== null && active !== lastY) {
        setDecade(active);
        setVisible(true);
        lastY = active;
        clearTimeout(window.__decadeTimer);
        window.__decadeTimer = setTimeout(() => setVisible(false), 2200);
      }
    };
    window.addEventListener('scroll', onScroll, { passive: true });
    return () => window.removeEventListener('scroll', onScroll);
  }, [isMobile]);
  if (isMobile || !decade) return null;
  return (
    <div style={{ position: 'fixed', left: 30, bottom: 30, zIndex: 95, opacity: visible ? 1 : 0, transition: 'opacity 0.6s', pointerEvents: 'none' }}>
      <div style={{ fontFamily: 'var(--serif-display)', fontStyle: 'italic', fontSize: 84, fontWeight: 500, color: 'var(--accent)', lineHeight: 1, textShadow: '0 2px 8px rgba(60,40,20,0.15)' }}>
        {decade}
      </div>
    </div>
  );
}

// === Implementation 7: Konami easter egg → 1865 mode ===
function KonamiMode() {
  React.useEffect(() => {
    const seq = ['ArrowUp','ArrowUp','ArrowDown','ArrowDown','ArrowLeft','ArrowRight','ArrowLeft','ArrowRight','b','a'];
    let pos = 0;
    const onKey = (e) => {
      const want = seq[pos];
      if (e.key === want || e.key.toLowerCase() === want) {
        pos++;
        if (pos === seq.length) {
          pos = 0;
          document.documentElement.classList.add('era-1865');
          // notification
          const note = document.createElement('div');
          note.textContent = 'Активирован режим 1865 года';
          note.style.cssText = 'position:fixed;top:20%;left:50%;transform:translateX(-50%);background:#3d2e1a;color:#f4ead5;padding:18px 32px;font-family:"Old Standard TT",serif;font-style:italic;font-size:18px;border:2px double #c46a3a;z-index:99999;letter-spacing:0.05em;box-shadow:0 20px 60px rgba(0,0,0,0.4);';
          document.body.appendChild(note);
          setTimeout(() => note.remove(), 3500);
          setTimeout(() => document.documentElement.classList.remove('era-1865'), 30000);
        }
      } else {
        pos = 0;
      }
    };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, []);
  return null;
}

// === Implementation 8: Idle ambient atmosphere ===
function IdleAmbient() {
  const [idle, setIdle] = React.useState(false);
  React.useEffect(() => {
    let t;
    const reset = () => {
      clearTimeout(t);
      if (idle) setIdle(false);
      t = setTimeout(() => setIdle(true), 90000);
    };
    ['mousemove','keydown','scroll','click','touchstart'].forEach(e => window.addEventListener(e, reset, { passive: true }));
    reset();
    return () => {
      clearTimeout(t);
      ['mousemove','keydown','scroll','click','touchstart'].forEach(e => window.removeEventListener(e, reset));
    };
  }, [idle]);
  React.useEffect(() => {
    document.documentElement.classList.toggle('is-idle', idle);
  }, [idle]);
  return null;
}

function MyArchive() {
  const isMobile = typeof window.useMobile === 'function' ? window.useMobile() : false;
  const [open, setOpen] = React.useState(false);
  const [step, setStep] = React.useState('start'); // start | story | photo | done
  const [text, setText] = React.useState('');
  const [author, setAuthor] = React.useState('');
  const [contact, setContact] = React.useState('');
  const submit = () => {
    const fd = new FormData();
    fd.append('form-name', 'story');
    fd.append('author', author);
    fd.append('contact', contact);
    fd.append('story-text', text);
    fetch('/', { method: 'POST', body: new URLSearchParams(fd).toString(), headers: { 'Content-Type': 'application/x-www-form-urlencoded' } })
      .then(() => setStep('done')).catch(() => setStep('done'));
    // also save to localStorage as backup
    const saved = JSON.parse(localStorage.getItem('taly-archive') || '[]');
    saved.push({ author, contact, text, ts: Date.now() });
    localStorage.setItem('taly-archive', JSON.stringify(saved));
  };
  if (!open) {
    return (
      <button onClick={() => setOpen(true)} aria-label="Мой архив"
        style={{ position: 'fixed', left: 20, top: isMobile ? 80 : 90, zIndex: 90, width: 56, height: 56, borderRadius: '50%', background: 'var(--moss-2)', color: 'var(--paper)', border: 'none', cursor: 'pointer', boxShadow: '0 8px 20px rgba(60,40,20,0.18)', fontFamily: 'var(--serif-display)', fontStyle: 'italic', fontSize: 24 }}>
        ✎
      </button>
    );
  }
  return (
    <div style={{ position: 'fixed', inset: 0, zIndex: 200, background: 'rgba(28,24,18,0.78)', display: 'flex', alignItems: 'center', justifyContent: 'center', padding: 20 }} onClick={() => setOpen(false)}>
      <div style={{ background: 'var(--paper)', maxWidth: 560, width: '100%', padding: isMobile ? '24px 20px' : '36px 40px', borderTop: '4px solid var(--accent)', boxShadow: '0 30px 80px rgba(0,0,0,0.4)' }} onClick={e => e.stopPropagation()}>
        {step === 'start' && (
          <>
            <div className="eyebrow" style={{ marginBottom: 8 }}>пополнить архив</div>
            <h3 style={{ fontFamily: 'var(--serif-display)', fontStyle: 'italic', fontSize: 32, color: 'var(--wood-4)', margin: '0 0 14px', fontWeight: 500 }}>Поделитесь воспоминанием</h3>
            <p style={{ fontFamily: 'var(--serif-text)', fontSize: 14, lineHeight: 1.6, color: 'var(--ink-2)', marginBottom: 18 }}>
              Старая фотография, рассказ бабушки, имя для мемориала, найденный документ — каждая крупица идёт в живой архив села.
            </p>
            <button onClick={() => setStep('story')} style={{ padding: '14px 24px', background: 'var(--wood-4)', color: 'var(--paper)', border: 'none', cursor: 'pointer', fontFamily: 'var(--sans)', fontSize: 11, letterSpacing: '0.16em', textTransform: 'uppercase', fontWeight: 600, marginRight: 12 }}>Рассказать историю</button>
            <button onClick={() => setOpen(false)} style={{ padding: '14px 24px', background: 'transparent', color: 'var(--wood-4)', border: '1px solid var(--wood-4)', cursor: 'pointer', fontFamily: 'var(--sans)', fontSize: 11, letterSpacing: '0.16em', textTransform: 'uppercase', fontWeight: 600 }}>Позже</button>
          </>
        )}
        {step === 'story' && (
          <>
            <div className="eyebrow" style={{ marginBottom: 8 }}>история</div>
            <h3 style={{ fontFamily: 'var(--serif-display)', fontStyle: 'italic', fontSize: 28, color: 'var(--wood-4)', margin: '0 0 18px', fontWeight: 500 }}>Что вы хотите рассказать?</h3>
            <input value={author} onChange={e => setAuthor(e.target.value)} placeholder="Ваше имя" style={{ width: '100%', padding: 12, fontFamily: 'var(--serif-text)', fontSize: 15, border: '1px solid var(--hairline-2)', background: 'var(--paper-2)', marginBottom: 10, boxSizing: 'border-box' }}/>
            <input value={contact} onChange={e => setContact(e.target.value)} placeholder="Контакт (e-mail, телефон, telegram)" style={{ width: '100%', padding: 12, fontFamily: 'var(--serif-text)', fontSize: 15, border: '1px solid var(--hairline-2)', background: 'var(--paper-2)', marginBottom: 10, boxSizing: 'border-box' }}/>
            <textarea value={text} onChange={e => setText(e.target.value)} placeholder="Ваша история, воспоминание, имя для мемориала..." rows={6} style={{ width: '100%', padding: 12, fontFamily: 'var(--serif-text)', fontSize: 15, border: '1px solid var(--hairline-2)', background: 'var(--paper-2)', marginBottom: 14, boxSizing: 'border-box', resize: 'vertical' }}/>
            <button onClick={submit} disabled={!text.trim()} style={{ padding: '14px 24px', background: text.trim() ? 'var(--accent)' : 'var(--hairline-2)', color: 'var(--paper)', border: 'none', cursor: text.trim() ? 'pointer' : 'default', fontFamily: 'var(--sans)', fontSize: 11, letterSpacing: '0.16em', textTransform: 'uppercase', fontWeight: 600, marginRight: 12 }}>Отправить</button>
            <button onClick={() => setOpen(false)} style={{ padding: '14px 24px', background: 'transparent', color: 'var(--wood-4)', border: '1px solid var(--wood-4)', cursor: 'pointer', fontFamily: 'var(--sans)', fontSize: 11, letterSpacing: '0.16em', textTransform: 'uppercase', fontWeight: 600 }}>Отмена</button>
          </>
        )}
        {step === 'done' && (
          <>
            <div className="eyebrow" style={{ marginBottom: 8, color: 'var(--moss-2)' }}>спасибо</div>
            <h3 style={{ fontFamily: 'var(--serif-display)', fontStyle: 'italic', fontSize: 32, color: 'var(--wood-4)', margin: '0 0 14px', fontWeight: 500 }}>Ваша история сохранена</h3>
            <p style={{ fontFamily: 'var(--serif-text)', fontSize: 14, lineHeight: 1.6, color: 'var(--ink-2)', marginBottom: 18 }}>
              Архив получит её в течение пары дней. Свяжемся, если понадобятся уточнения.
            </p>
            <button onClick={() => { setOpen(false); setStep('start'); setText(''); setAuthor(''); setContact(''); }} style={{ padding: '14px 24px', background: 'var(--wood-4)', color: 'var(--paper)', border: 'none', cursor: 'pointer', fontFamily: 'var(--sans)', fontSize: 11, letterSpacing: '0.16em', textTransform: 'uppercase', fontWeight: 600 }}>Закрыть</button>
          </>
        )}
      </div>
    </div>
  );
}

function ThemeFloater() {

  const apply = (t) => {
    setTheme(t);
    document.documentElement.setAttribute('data-theme', t);
    if (window.__TWEAKS__) window.__TWEAKS__.theme = t;
    const labels = { paper: 'Газета', day: 'День', night: 'Ночь' };
    const ann = document.getElementById('a11y-announce');
    if (ann) ann.textContent = `Тема: ${labels[t] || t}`;

  return (
    <div style={{ position: 'fixed', right: 20, bottom: 20, zIndex: 100, background: 'var(--paper)', border: '1px solid var(--hairline-2)', borderRadius: 0, boxShadow: '0 10px 30px rgba(0,0,0,0.18)', padding: '8px 10px', display: 'flex', gap: 4, alignItems: 'center', fontFamily: 'var(--serif-display)' }}>

      {[['paper','Газета'],['day','День'],['night','Ночь']].map(([id,label]) => (
        <button key={id} onClick={() => apply(id)} style={{
          padding: '6px 12px', background: theme === id ? 'var(--accent)' : 'transparent',
          color: theme === id ? 'var(--paper)' : 'var(--wood-4)',
          border: '1px solid ' + (theme === id ? 'var(--accent)' : 'var(--hairline-2)'),
          cursor: 'pointer', fontFamily: 'var(--serif-display)', fontStyle: 'italic',
          fontSize: 12, fontWeight: 600,

<script type="text/babel" data-presets="env,react">
function RadioTaly() {
  const [open, setOpen] = React.useState(false);
  const [playing, setPlaying] = React.useState(false);
  const [track, setTrack] = React.useState(0);
  const audioRef = React.useRef(null);
  const tracks = [
    { t: 'Ой ти, дівчино', author: 'бандуристи · нар. українська', src: 'audio/oy-ty-divchino.mp3' },
    { t: 'Вечір на дворі, ніч наступає', author: 'малорос. лирическая', src: 'audio/vechir-na-dvori.mp3' },
    { t: 'Видно село', author: 'хор України · народна', src: 'audio/vidno-selo.mp3' },
    { t: 'Зірка Донця', author: 'Державна капела бандуристів', src: 'audio/star-of-donets.mp3' },
    { t: 'Чорнії брови, карії очі', author: 'хор ім. Верьовки', src: 'audio/chorni-brovy.mp3' },
    { t: 'Дівчино, шумить гай', author: 'лирическая · народна', src: 'audio/divchino-shumit-hai.mp3' },
  ];

  /* swap audio source on track change */
  React.useEffect(() => {
    if (audioRef.current) {
      audioRef.current.pause();
      audioRef.current.onended = null;
    }
    const audio = new Audio(tracks[track].src);
    audio.onended = () => setTrack(t => (t + 1) % tracks.length);
    audioRef.current = audio;
    if (playing) audio.play().catch(() => setPlaying(false));
    return () => { audio.pause(); audio.onended = null; };
  }, [track]);

  /* handle play / pause */
  React.useEffect(() => {
    if (!audioRef.current) return;
    if (playing) audioRef.current.play().catch(() => setPlaying(false));
    else audioRef.current.pause();
  }, [playing]);
  return (
    <div style={{ position: 'fixed', left: 20, bottom: 20, zIndex: 100 }}>
      {open && (
        <div style={{ position: 'absolute', left: 0, bottom: 60, width: 320, background: 'var(--paper)', border: '1px solid var(--hairline-2)', boxShadow: '0 14px 40px rgba(60,40,20,0.2)', padding: '18px 20px', fontFamily: "'Old Standard TT', serif" }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'baseline', marginBottom: 14 }}>
            <div>
              <div style={{ fontSize: 9, letterSpacing: '0.15em', textTransform: 'uppercase', color: 'var(--ink-soft)', fontFamily: 'var(--sans)' }}>радио · Талы FM</div>
              <div style={{ fontStyle: 'italic', fontWeight: 700, fontSize: 22, color: 'var(--wood-4)', marginTop: 2 }}>97.4 МГц</div>
            </div>
            <button onClick={() => setOpen(false)} style={{ background: 'none', border: 'none', cursor: 'pointer', fontSize: 18, color: 'var(--ink-soft)' }}>×</button>
          </div>
          <div style={{ background: 'var(--paper-2)', padding: '12px 14px', borderLeft: '3px solid var(--accent)', marginBottom: 14 }}>
            <div style={{ fontSize: 9, color: 'var(--ink-soft)', letterSpacing: '0.1em', textTransform: 'uppercase', fontFamily: 'var(--sans)' }}>{playing ? 'сейчас в эфире' : 'эфир приостановлен'}</div>
            <div style={{ fontStyle: 'italic', fontWeight: 700, fontSize: 16, color: 'var(--ink)', marginTop: 4 }}>{tracks[track].t}</div>
            <div style={{ fontStyle: 'italic', fontSize: 12, color: 'var(--ink-soft)', marginTop: 2 }}>{tracks[track].author}</div>
          </div>
          <div style={{ display: 'flex', gap: 8, marginBottom: 14 }}>
            <button onClick={() => setTrack((track - 1 + tracks.length) % tracks.length)} style={{ flex: 1, padding: '10px', background: 'var(--paper-2)', border: '1px solid var(--hairline-2)', cursor: 'pointer', fontFamily: 'var(--serif-display)' }}>◂◂</button>
            <button onClick={() => setPlaying(!playing)} style={{ flex: 2, padding: '10px', background: 'var(--accent)', border: 'none', color: 'var(--paper)', cursor: 'pointer', fontFamily: 'var(--serif-display)', fontStyle: 'italic', fontWeight: 700, fontSize: 14 }}>{playing ? '❚❚ пауза' : '▶ играть'}</button>
            <button onClick={() => setTrack((track + 1) % tracks.length)} style={{ flex: 1, padding: '10px', background: 'var(--paper-2)', border: '1px solid var(--hairline-2)', cursor: 'pointer', fontFamily: 'var(--serif-display)' }}>▸▸</button>
          </div>
          <div style={{ borderTop: '1px solid var(--hairline)', paddingTop: 12, maxHeight: 140, overflowY: 'auto' }}>
            {tracks.map((tr, i) => (
              <div key={i} onClick={() => { setTrack(i); setPlaying(true); }}
                   style={{ padding: '6px 0', cursor: 'pointer', display: 'flex', justifyContent: 'space-between', borderBottom: i < tracks.length - 1 ? '1px dotted var(--hairline)' : 'none' }}>
                <span style={{ fontStyle: 'italic', fontSize: 13, color: i === track ? 'var(--accent)' : 'var(--ink-2)', fontWeight: i === track ? 700 : 400 }}>{i + 1}. {tr.t}</span>
              </div>
            ))}
          </div>
          <div style={{ marginTop: 12, fontStyle: 'italic', fontSize: 10, color: 'var(--ink-soft)', textAlign: 'center', fontFamily: 'var(--serif-text)' }}>
            Народные песни Острогожского края · archive.org
          </div>
        </div>
      )}
      <button onClick={() => setOpen(!open)} style={{
        width: 56, height: 56, borderRadius: '50%', background: open ? 'var(--accent)' : 'var(--paper)',
        color: open ? 'var(--paper)' : 'var(--wood-4)', border: '1.5px solid var(--wood-4)',
        cursor: 'pointer', boxShadow: '0 8px 20px rgba(60,40,20,0.2)',
        fontFamily: 'var(--serif-display)', fontStyle: 'italic', fontWeight: 700, fontSize: 18,
        display: 'flex', alignItems: 'center', justifyContent: 'center',
        animation: playing && !open ? 'radioPulse 1.4s ease-in-out infinite' : 'none',
      }}>📻</button>
      <style>{`@keyframes radioPulse { 0%, 100% { box-shadow: 0 8px 20px rgba(60,40,20,0.2); } 50% { box-shadow: 0 8px 20px rgba(60,40,20,0.2), 0 0 0 8px rgba(196,106,58,0.18); } }`}</style>
    </div>
  );
}
const rRoot = document.createElement('div');
document.body.appendChild(rRoot);
ReactDOM.createRoot(rRoot).render(<RadioTaly/>);
</script>
